name: README Link Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  readme-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in README
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --retry-wait-time 2
            --max-retries 3
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
